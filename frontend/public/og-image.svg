<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g font-family="Inter, system-ui, sans-serif" fill="#f5f5f7">
    <text x="80" y="180" font-size="32" font-weight="600" fill="#a78bfa" letter-spacing="6">PANDIYARAJAN S</text>
    <text x="80" y="320" font-size="92" font-weight="800" letter-spacing="-2">Senior Software</text>
    <text x="80" y="430" font-size="92" font-weight="800" letter-spacing="-2" fill="url(#grad)">Engineer</text>
    <text x="80" y="500" font-size="28" font-weight="500" fill="#cbd5e1">5+ yrs · Python · Django · FastAPI · React · Distributed Systems</text>
  </g>

  <g transform="translate(950 80)">
    <rect width="180" height="180" rx="36" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <text x="90" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="120" font-weight="800" fill="url(#grad)">P</text>
  </g>
</svg>
